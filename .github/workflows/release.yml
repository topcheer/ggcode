name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      package_version:
        description: "Version label for manual packaging runs"
        required: false
        default: "v0.0.0"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go build -tags goolm -o /tmp/ggcode-release ./cmd/ggcode
      - run: go test -tags goolm -timeout 5m ./...
      - run: go vet -tags goolm ./...

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: verify
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true
          version: latest
      - name: Validate GoReleaser config
        run: goreleaser check
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean --skip=publish' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
      - name: Render release notes
        if: github.event_name != 'workflow_dispatch'
        run: |
          chmod +x ./scripts/release/render-notes.sh
          ./scripts/release/render-notes.sh "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" > /tmp/release-notes.md
      - name: Apply release notes
        if: github.event_name != 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --notes-file /tmp/release-notes.md
      - name: Upload GoReleaser dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: dist/

  release-smoke-linux:
    name: Smoke Linux binary
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist
          path: dist
      - name: Smoke test linux archive
        shell: bash
        run: |
          chmod +x ./scripts/release/smoke-binary.sh
          workdir="$(mktemp -d)"
          tar -xzf dist/ggcode_linux_x86_64.tar.gz -C "${workdir}"
          ./scripts/release/smoke-binary.sh "${workdir}/ggcode"

  release-smoke-macos:
    name: Smoke macOS binary
    runs-on: macos-latest
    needs: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist
          path: dist
      - name: Smoke test macOS archive
        shell: bash
        run: |
          chmod +x ./scripts/release/smoke-binary.sh
          workdir="$(mktemp -d)"
          arch="$(uname -m)"
          case "${arch}" in
            arm64) archive="dist/ggcode_darwin_arm64.tar.gz" ;;
            *) archive="dist/ggcode_darwin_x86_64.tar.gz" ;;
          esac
          tar -xzf "${archive}" -C "${workdir}"
          ./scripts/release/smoke-binary.sh "${workdir}/ggcode"

  release-smoke-windows:
    name: Smoke Windows binary
    runs-on: windows-latest
    timeout-minutes: 3
    continue-on-error: true
    needs: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist
          path: dist
      - name: Smoke test windows archive
        shell: pwsh
        run: |
          $workDir = Join-Path $env:RUNNER_TEMP "ggcode-windows-smoke"
          New-Item -ItemType Directory -Force -Path $workDir | Out-Null
          Expand-Archive -Path dist\ggcode_windows_x86_64.zip -DestinationPath $workDir -Force
          $exe = Join-Path $workDir "ggcode.exe"
          .\scripts\release\smoke-binary.ps1 -BinaryPath $exe

  release-smoke-installer:
    name: Smoke installer flow
    runs-on: ubuntu-latest
    needs: release
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
      GGCODE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.package_version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist
          path: dist
      - name: Smoke test installer against local release mirror
        shell: bash
        run: |
          chmod +x ./scripts/release/smoke-binary.sh ./scripts/release/smoke-installer.sh
          ./scripts/release/smoke-installer.sh "${GGCODE_VERSION}" dist

  release-macos-pkg:
    name: Build macOS pkg
    runs-on: macos-latest
    needs:
      - release
      - release-smoke-linux
      - release-smoke-macos
      - release-smoke-installer
    permissions:
      contents: write
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
      GGCODE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.package_version || github.ref_name }}
      GGCODE_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Capture build date
        shell: bash
        run: echo "GGCODE_DATE=$(git show -s --format=%cI "${GITHUB_SHA}")" >> "${GITHUB_ENV}"
      - name: Build macOS installer package
        shell: bash
        run: |
          chmod +x ./scripts/release/build-macos-pkg.sh
          ./scripts/release/build-macos-pkg.sh "${GGCODE_VERSION}" dist
      - name: Upload macOS package to release
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/*.pkg --clobber
      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: dist/*.pkg

  release-windows-msi:
    name: Build Windows msi
    runs-on: windows-latest
    needs:
      - release
      - release-smoke-linux
      - release-smoke-macos
      - release-smoke-installer
    permissions:
      contents: write
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
      GGCODE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.package_version || github.ref_name }}
      GGCODE_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.dotnet\tools"
          wix --version
      - name: Capture build date
        shell: pwsh
        run: |
          $date = git show -s --format=%cI $env:GITHUB_SHA
          Add-Content -Path $env:GITHUB_ENV -Value "GGCODE_DATE=$date"
      - name: Build Windows MSI packages
        shell: pwsh
        run: .\scripts\release\build-windows-msi.ps1 -Version $env:GGCODE_VERSION -OutputDir dist
      - name: Upload Windows MSI packages to release
        if: github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem -Path dist -Filter *.msi | ForEach-Object {
            gh release upload $env:GITHUB_REF_NAME $_.FullName --clobber
          }
      - name: Upload Windows MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/*.msi

  build-desktop-darwin:
    name: Build desktop macOS
    runs-on: macos-latest
    needs:
      - verify
      - release
    permissions:
      contents: write
    env:
      GGCODE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.package_version || github.ref_name }}
      GGCODE_COMMIT: ${{ github.sha }}
      CGO_ENABLED: 1
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Capture build date
        shell: bash
        run: echo "GGCODE_DATE=$(git show -s --format=%cI "${GITHUB_SHA}")" >> "${GITHUB_ENV}"
      - name: Prepare Apple signing credentials
        shell: bash
        env:
          APPLE_DEVELOPER_ID_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          if [[ -n "${APPLE_DEVELOPER_ID_P12}" && -n "${APPLE_API_KEY_P8}" ]]; then
            echo "APPLE_SIGN_IDENTITY=Developer ID Application: Junjun Zhang (EGZFS7M525)" >> "${GITHUB_ENV}"
            P12_FILE="$(mktemp -u -t cert -p .p12)"
            echo "${APPLE_DEVELOPER_ID_P12}" | base64 -d > "${P12_FILE}"
            echo "APPLE_DEVELOPER_ID_P12_PATH=${P12_FILE}" >> "${GITHUB_ENV}"
            echo "APPLE_DEVELOPER_ID_P12_PASSWORD=${APPLE_DEVELOPER_ID_P12_PASSWORD}" >> "${GITHUB_ENV}"

            KEY_FILE="$(mktemp -u -t authkey -p .p8)"
            echo "${APPLE_API_KEY_P8}" | base64 -d > "${KEY_FILE}"
            echo "APPLE_API_KEY_PATH=${KEY_FILE}" >> "${GITHUB_ENV}"
            echo "APPLE_API_KEY_ID=${APPLE_API_KEY_ID}" >> "${GITHUB_ENV}"
            echo "APPLE_API_ISSUER_ID=${APPLE_API_ISSUER_ID}" >> "${GITHUB_ENV}"
            echo "Apple signing credentials prepared"
          else
            echo "No Apple signing credentials found — building unsigned"
          fi
      - name: Build desktop macOS DMG
        shell: bash
        run: |
          chmod +x ./scripts/release/build-desktop-darwin.sh
          ./scripts/release/build-desktop-darwin.sh "${GGCODE_VERSION}" dist
      - name: Upload desktop macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-darwin
          path: dist/*.dmg
      - name: Upload desktop macOS DMG to release
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/*.dmg --clobber

  build-desktop-windows:
    name: Build desktop Windows
    runs-on: windows-latest
    needs:
      - verify
      - release
    permissions:
      contents: write
    env:
      GGCODE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.package_version || github.ref_name }}
      GGCODE_COMMIT: ${{ github.sha }}
      CGO_ENABLED: 1
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install GCC (MinGW)
        shell: pwsh
        run: choco install mingw --yes
      - name: Capture build date
        shell: pwsh
        run: |
          $date = git show -s --format=%cI $env:GITHUB_SHA
          Add-Content -Path $env:GITHUB_ENV -Value "GGCODE_DATE=$date"
      - name: Build desktop Windows
        shell: pwsh
        run: |
          .\scripts\release\build-desktop-windows.ps1 -Version $env:GGCODE_VERSION -OutputDir dist
      - name: Upload desktop Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: dist/
      - name: Upload desktop Windows exe to release
        if: github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem -Path dist -Filter *.exe | ForEach-Object {
            gh release upload $env:GITHUB_REF_NAME $_.FullName --clobber
          }

  build-desktop-linux:
    name: Build desktop Linux
    runs-on: ubuntu-latest
    needs:
      - verify
      - release
    permissions:
      contents: write
    env:
      GGCODE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.package_version || github.ref_name }}
      GGCODE_COMMIT: ${{ github.sha }}
      CGO_ENABLED: 1
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Fyne dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxcursor-dev libxi-dev libxinerama-dev libxxf86vm-dev libglfw3-dev libpulse-dev
      - name: Capture build date
        shell: bash
        run: echo "GGCODE_DATE=$(git show -s --format=%cI "${GITHUB_SHA}")" >> "${GITHUB_ENV}"
      - name: Build desktop Linux
        shell: bash
        run: |
          chmod +x ./scripts/release/build-desktop-linux.sh
          ./scripts/release/build-desktop-linux.sh "${GGCODE_VERSION}" dist
      - name: Upload desktop Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: dist/ggcode-desktop_*
      - name: Upload desktop Linux binary to release
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/ggcode-desktop_* --clobber

  publish-site-release-branch:
    name: Publish site release branch
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - release
      - release-smoke-linux
      - release-smoke-macos
      - release-smoke-installer
      - release-macos-pkg
      - release-windows-msi
      - build-desktop-darwin
      - build-desktop-windows
      - build-desktop-linux
    permissions:
      contents: write
    env:
      TARGET_BRANCH: copilot/site-release-update
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: dist-site/macos-pkg
      - uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist-site/windows-msi
      - uses: actions/download-artifact@v4
        with:
          name: desktop-darwin
          path: dist-site/desktop-darwin
      - uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: dist-site/desktop-windows
      - uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: dist-site/desktop-linux
      - name: Publish release assets into deployment branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          chmod +x ./scripts/release/publish-site-branch.sh
          ./scripts/release/publish-site-branch.sh \
            --target-branch "${TARGET_BRANCH}" \
            --asset-dir dist \
            --asset-dir dist-site/macos-pkg \
            --asset-dir dist-site/windows-msi \
            --asset-dir dist-site/desktop-darwin \
            --asset-dir dist-site/desktop-windows \
            --asset-dir dist-site/desktop-linux \
            --source-label "${GITHUB_REF_NAME}"
