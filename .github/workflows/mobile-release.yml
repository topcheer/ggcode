name: Mobile Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.3.16)'
        required: false
        type: string
      platform:
        description: 'Platform (both, ios, android)'
        required: false
        type: string
        default: 'both'
      expire_and_promote:
        description: 'Expire previous iOS beta build and promote latest to External Testing'
        required: false
        type: boolean
        default: false
      build_number:
        description: 'Build number to promote (e.g. 2026061904). Leave empty for latest.'
        required: false
        type: string

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.7'

jobs:
  # ── Expire & Promote (fix stuck beta review) ──────────────────
  expire-and-promote:
    name: Expire & promote iOS beta
    runs-on: macos-15
    if: ${{ github.event.inputs.expire_and_promote == 'true' }}
    env:
      APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
      APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
      APP_STORE_PRIVATE_KEY: ${{ secrets.APP_STORE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: mobile/flutter/ios

      - name: Expire previous builds and promote latest
        working-directory: mobile/flutter/ios
        run: |
          bundle install --jobs 4 --retry 3
          ARGS=""
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            ARGS="build_number:${{ github.event.inputs.build_number }}"
          fi
          bundle exec fastlane expire_and_promote $ARGS

  # ── Verify ──────────────────────────────────────────────────
  verify:
    name: Verify mobile
    runs-on: ubuntu-latest
    if: ${{ !inputs.expire_and_promote }}
    defaults:
      run:
        working-directory: mobile/flutter
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  # ── Android ─────────────────────────────────────────────────
  build-android:
    name: Build & deploy Android
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ !inputs.expire_and_promote && (inputs.platform == 'both' || inputs.platform == 'android' || inputs.platform == '' || inputs.platform == null) }}
    defaults:
      run:
        working-directory: mobile/flutter
    env:
      PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: mobile/flutter/android

      - name: Setup Android signing
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload.jks
          EOF

      - name: Show version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            REF="${{ github.ref_name }}"
            if [[ "$REF" == v* ]]; then
              VERSION="${REF#v}"
            fi
          fi
          echo "Version: ${VERSION}"
          grep '^version:' pubspec.yaml
          # Version numbers are synced by pre-push hook; no CI bump

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Deploy to Google Play
        id: deploy_android
        run: |
          cd android
          bundle install --jobs 4 --retry 3
          bundle exec fastlane deploy


  # ── iOS ─────────────────────────────────────────────────────
  build-ios:
    name: Build & deploy iOS
    needs: verify
    runs-on: macos-15
    if: ${{ !inputs.expire_and_promote && (inputs.platform == 'both' || inputs.platform == 'ios' || inputs.platform == '' || inputs.platform == null) }}
    defaults:
      run:
        working-directory: mobile/flutter
    env:
      APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
      APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
      APP_STORE_PRIVATE_KEY: ${{ secrets.APP_STORE_PRIVATE_KEY }}
    steps:
      - name: Setup Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: mobile/flutter/ios

      - name: Install Apple Distribution certificate & provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
          PP_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"

          # Install certificate
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$P12_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$P12_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$P12_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p "$PP_PATH"
          PP_FILE=$(echo -n "$PP_BASE64" | base64 --decode -o "$RUNNER_TEMP/profile.mobileprovision" && echo "$RUNNER_TEMP/profile.mobileprovision")
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP_FILE")")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(security cms -D -i "$PP_FILE")")
          cp "$PP_FILE" "$PP_PATH/$PP_UUID.mobileprovision"
          echo "Installed profile: $PP_NAME ($PP_UUID)"

          # Save for later steps
          echo "PP_UUID=$PP_UUID" >> "$GITHUB_ENV"
          echo "PP_NAME=$PP_NAME" >> "$GITHUB_ENV"

      - name: Show version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            REF="${{ github.ref_name }}"
            if [[ "$REF" == v* ]]; then
              VERSION="${REF#v}"
            fi
          fi
          echo "Version: ${VERSION}"
          grep '^version:' pubspec.yaml
          # Version numbers are synced by pre-push hook; no CI bump

      - name: Clean Flutter build cache
        run: flutter clean

      - name: Install iOS dependencies
        run: |
          cd ios
          pod install || true

      - name: Build IPA
        shell: bash
        run: |
          # Override Xcode project to Manual signing
          PBX=ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBX"
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";/g' "$PBX"
          # Set provisioning profile UUID
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"${PP_UUID}\";/g" "$PBX" || true
          # Add PROVISIONING_PROFILE_SPECIFIER if not present
          grep -q "PROVISIONING_PROFILE_SPECIFIER" "$PBX" || \
            sed -i '' 's/DEVELOPMENT_TEAM = EGZFS7M525;/DEVELOPMENT_TEAM = EGZFS7M525; PROVISIONING_PROFILE_SPECIFIER = "'"$PP_UUID"'";/g' "$PBX"

          # Create ExportOptions.plist
          cat > ios/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>EGZFS7M525</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>gg.ai.ggcode.mobile</key>
              <string>${PP_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

          # Build archive (not just build) so we get .xcarchive
          flutter build ipa --release --no-codesign

          # Disable errexit and pipefail for the patch section
          set +e
          set +o pipefail

          # Patch xcarchive App.framework MinimumOSVersion BEFORE export.
          ARCHIVE_PATH=$(find build/ios/archive -maxdepth 1 -name "*.xcarchive" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE_PATH" ]; then
            ARCHIVE_PATH=$(find /Users/runner/Library/Developer/Xcode/Archives -maxdepth 3 -name "*.xcarchive" 2>/dev/null | head -1)
          fi
          echo "Archive path: $ARCHIVE_PATH"

          if [ -n "$ARCHIVE_PATH" ]; then
            echo "Patching xcarchive: $ARCHIVE_PATH"
            FRAMEWORKS_DIR="$ARCHIVE_PATH/Products/Applications/Runner.app/Frameworks"
            if [ -d "$FRAMEWORKS_DIR" ]; then
              for plist in $(find "$FRAMEWORKS_DIR" -name "Info.plist"); do
                val=$(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$plist" 2>/dev/null)
                if [ -z "$val" ]; then
                  /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 17.0" "$plist" 2>/dev/null
                  echo "Patched: $(basename $(dirname $plist))"
                fi
              done
            else
              echo "WARNING: Frameworks dir not found at $FRAMEWORKS_DIR"
            fi
          else
            echo "ERROR: No xcarchive found"
            exit 1
          fi

          # Re-enable errexit and pipefail for export
          set -e
          set -o pipefail

          # Export the patched archive to IPA with code signing
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa/ \
            -allowProvisioningUpdates

      - name: Check if build already uploaded
        id: check-build
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_PRIVATE_KEY: ${{ secrets.APP_STORE_PRIVATE_KEY }}
        run: |
          BUILD_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/Runner/Info.plist)
          echo "Build version: $BUILD_VERSION"
          cd ios
          bundle install --jobs 4 --retry 3
          # Check if this build version already exists in App Store Connect
          CHECK_RESULT=$(bundle exec fastlane check_build_version build_number:"$BUILD_VERSION" 2>&1 || true)
          echo "$CHECK_RESULT"
          if echo "$CHECK_RESULT" | grep -q "ALREADY_UPLOADED"; then
            echo "::Notice::Build $BUILD_VERSION already uploaded to App Store Connect. Skipping upload."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to TestFlight & promote
        if: steps.check-build.outputs.skip != 'true'
        run: |
          cd ios
          bundle install --jobs 4 --retry 3
          bundle exec fastlane deploy_external

      - name: Submit for App Store Review
        if: steps.check-build.outputs.skip != 'true'
        continue-on-error: true
        run: |
          cd ios
          bundle exec fastlane submit_for_review

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

