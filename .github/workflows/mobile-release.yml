name: Mobile Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.3.16)'
        required: false
        type: string
      platform:
        description: 'Platform (both, ios, android)'
        required: false
        type: string
        default: 'both'

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.7'

jobs:
  # ── Verify ──────────────────────────────────────────────────
  verify:
    name: Verify mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/flutter
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  # ── Android ─────────────────────────────────────────────────
  build-android:
    name: Build & deploy Android
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == 'both' || inputs.platform == 'android' || inputs.platform == '' || inputs.platform == null }}
    defaults:
      run:
        working-directory: mobile/flutter
    env:
      PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: mobile/flutter/android

      - name: Setup Android signing
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload.jks
          EOF

      - name: Sync version
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          bash scripts/version_sync.sh "$VERSION"

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Deploy to Google Play
        run: |
          cd android
          bundle install --jobs 4 --retry 3
          bundle exec fastlane deploy

      - name: Commit build number
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .build-number android/app/build.gradle.kts
          git diff --cached --quiet || git commit -m "chore(mobile): android build number update [skip ci]"
          git push origin HEAD:main || true

  # ── iOS ─────────────────────────────────────────────────────
  build-ios:
    name: Build & deploy iOS
    needs: verify
    runs-on: macos-15
    if: ${{ inputs.platform == 'both' || inputs.platform == 'ios' || inputs.platform == '' || inputs.platform == null }}
    defaults:
      run:
        working-directory: mobile/flutter
    env:
      APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
      APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
      APP_STORE_PRIVATE_KEY: ${{ secrets.APP_STORE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: mobile/flutter/ios

      - name: Install Apple Distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$P12_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$P12_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$P12_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sync version
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          bash scripts/version_sync.sh "$VERSION"

      - name: Fetch provisioning profile via fastlane sigh
        run: |
          cd ios
          bundle install --jobs 4 --retry 3
          bundle exec fastlane fetch_profiles

      - name: Install iOS dependencies
        run: |
          cd ios
          pod install || true

      - name: Build IPA
        shell: bash
        run: |
          # Get provisioning profile UUID and name installed by sigh
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PP_FILE=$(ls "$PP_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PP_FILE" ]; then
            echo "ERROR: No provisioning profile found"
            exit 1
          fi
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP_FILE")")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(security cms -D -i "$PP_FILE")")
          echo "Provisioning profile: $PP_NAME ($PP_UUID)"

          # Create ExportOptions.plist for manual signing
          cat > ios/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>EGZFS7M525</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>gg.ai.ggcode.mobile</key>
              <string>PP_PLACEHOLDER</string>
            </dict>
          </dict>
          </plist>
          PLIST
          sed -i '' "s/PP_PLACEHOLDER/$PP_NAME/" ios/ExportOptions.plist

          # Build with manual signing: archive args via --, export via ExportOptions.plist
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            -- \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_UUID" \
            DEVELOPMENT_TEAM=EGZFS7M525

      - name: Upload to TestFlight & promote
        run: |
          cd ios
          bundle exec fastlane deploy_external

      - name: Commit build number
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .build-number ios/Runner/Info.plist
          git diff --cached --quiet || git commit -m "chore(mobile): ios build number update [skip ci]"
          git push origin HEAD:main || true

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

