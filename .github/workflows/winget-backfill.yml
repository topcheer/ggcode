name: Winget Backfill

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.3.82)'
        required: true
        type: string

jobs:
  publish-desktop:
    name: Publish desktop to winget
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
      WINGET_PACKAGE_ID: gg.ai.ggcode-desktop
    steps:
      - uses: actions/checkout@v6
      - name: Submit winget update
        shell: pwsh
        run: |
          if (-not $env:WINGET_CREATE_GITHUB_TOKEN) {
            Write-Host "WINGET_CREATE_GITHUB_TOKEN not configured; skipping."
            exit 0
          }
          $packageValue = "${{ inputs.version }}" -replace '^v',''
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}"
          $installerUrlX64 = "${baseUrl}/ggcode-desktop_${packageValue}_windows_x64.msi"
          $installerUrlArm64 = "${baseUrl}/ggcode-desktop_${packageValue}_windows_arm64.msi"
          .\scripts\release\publish-winget.ps1 `
            -PackageId $env:WINGET_PACKAGE_ID `
            -Version "${{ inputs.version }}" `
            -InstallerUrl $installerUrlX64 `
            -InstallerUrlArm64 $installerUrlArm64 `
            -GitHubToken $env:WINGET_CREATE_GITHUB_TOKEN

  publish-cli:
    name: Publish CLI to winget
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
      WINGET_PACKAGE_ID: gg.ai.ggcode-cli
    steps:
      - uses: actions/checkout@v6
      - name: Submit winget update
        shell: pwsh
        run: |
          if (-not $env:WINGET_CREATE_GITHUB_TOKEN) {
            Write-Host "WINGET_CREATE_GITHUB_TOKEN not configured; skipping."
            exit 0
          }
          $packageValue = "${{ inputs.version }}" -replace '^v',''
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}"
          $installerUrlX64 = "${baseUrl}/ggcode_${packageValue}_windows_x64.msi"
          $installerUrlArm64 = "${baseUrl}/ggcode_${packageValue}_windows_arm64.msi"
          .\scripts\release\publish-winget.ps1 `
            -PackageId $env:WINGET_PACKAGE_ID `
            -Version "${{ inputs.version }}" `
            -InstallerUrl $installerUrlX64 `
            -InstallerUrlArm64 $installerUrlArm64 `
            -GitHubToken $env:WINGET_CREATE_GITHUB_TOKEN
