name: Publish Site

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch that stores the published static site"
        required: false
        default: "copilot/site-release-update"
  push:
    branches:
      - main
    paths:
      - docs/site/**
      - .github/workflows/site-release.yml
      - scripts/release/publish-site-branch.sh

permissions:
  contents: write

jobs:
  publish-site:
    name: Publish site branch
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || 'copilot/site-release-update' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Publish deployment branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./scripts/release/publish-site-branch.sh
          ./scripts/release/publish-site-branch.sh \
            --target-branch "${TARGET_BRANCH}" \
            --preserve-latest \
            --source-label "${GITHUB_SHA}"
