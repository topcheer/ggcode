name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - run: go mod download
      - run: go build -o /tmp/ggcode ./cmd/ggcode
      - run: go vet ./...
      - run: git config --global user.name "CI" && git config --global user.email "ci@ggcode.dev"
      - run: go test -tags=!integration ./...

  lint:
    name: Format
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - run: test -z "$(gofmt -l .)"
