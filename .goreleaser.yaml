version: 2

builds:
  - main: ./cmd/ggcode
    binary: ggcode
    env:
      - CGO_ENABLED=0
    ldflags:
      - >-
        -s -w
        -X github.com/topcheer/ggcode/internal/version.Version={{ .Version }}
        -X github.com/topcheer/ggcode/internal/version.Commit={{ .Commit }}
        -X github.com/topcheer/ggcode/internal/version.Date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
