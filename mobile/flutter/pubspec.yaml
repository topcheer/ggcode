name: ggcode_mobile
description: Remote control client for GGCode AI coding agent.
publish_to: 'none'
version: 1.3.7+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  web_socket_channel: ^2.4.0
  mobile_scanner: ^3.5.5
  flutter_markdown: ^0.6.18
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  url_launcher: ^6.2.2
  google_fonts: ^6.1.0
  animations: ^2.0.8
  flutter_mermaid: ^0.1.0
  cryptography: ^2.9.0
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
