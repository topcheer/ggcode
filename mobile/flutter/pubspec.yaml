name: ggcode_mobile
description: Remote control client for GGCode AI coding agent.
publish_to: 'none'
version: 1.3.132+2026070604

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  web_socket_channel: ^3.0.0
  mobile_scanner: ^7.0.0
  flutter_markdown_plus: ^1.0.0
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  url_launcher: ^6.2.2
  google_fonts: ^8.0.0
  animations: ^2.0.8
  flutter_mermaid: ^0.1.0
  cryptography: ^2.9.0
  wakelock_plus: ^1.6.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3: ^3.3.2
  sqlite3_flutter_libs: ^0.6.0+eol
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
