# ggcode.example.yaml
# Full configuration example for ggcode
# Copy to ~/.ggcode/ggcode.yaml, or pass it explicitly with --config ./ggcode.yaml

# Active vendor / endpoint / model
vendor: zai
endpoint: cn-coding-openai
model: glm-5-turbo

# TUI language: en or zh-CN
language: en

# Runtime mode: supervised, plan, auto, bypass, or autopilot
default_mode: supervised

# System prompt injected at the start of every conversation
# system_prompt: "You are a helpful coding assistant."

# Vendor-specific settings
vendors:
  zai:
    display_name: Z.ai
    api_key: ${ZAI_API_KEY}
    endpoints:
      cn-coding-openai:
        display_name: 国内 Coding Plan
        protocol: openai
        base_url: https://open.bigmodel.cn/api/coding/paas/v4
        default_model: glm-5-turbo
        selected_model: glm-5-turbo
        max_tokens: 8192
        models: [glm-5-turbo, glm-5-plus]
        tags: [coding, cn]
      cn-coding-anthropic:
        display_name: 国内 Coding Plan (Anthropic)
        protocol: anthropic
        base_url: https://open.bigmodel.cn/api/anthropic
        max_tokens: 8192
        tags: [coding, cn, anthropic]
      global-coding-openai:
        display_name: 国外 Coding Plan
        protocol: openai
        base_url: https://your-global-coding-endpoint.example.com/v1
        default_model: glm-5-turbo
        max_tokens: 8192
        models: [glm-5-turbo, glm-5-plus]
        tags: [coding, global]
      global-api-openai:
        display_name: 国外普通 API
        protocol: openai
        base_url: https://your-global-api-endpoint.example.com/v1
        default_model: glm-4.5-air
        max_tokens: 8192
        models: [glm-4.5-air, glm-4.5]
        tags: [api, global]

# Directories the agent is allowed to access (relative to config file or absolute)
allowed_dirs:
  - .

# Maximum agentic loop iterations per user turn
max_iterations: 50

# Per-tool permission rules: ask (prompt user), allow (auto-approve), deny (block)
tool_permissions:
  read_file: allow
  write_file: ask
  edit_file: ask
  list_directory: allow
  search_files: allow
  glob: allow
  run_command: ask
  git_status: allow
  git_diff: allow
  git_log: allow

# MCP servers for extended tool sets
mcp_servers:
  - name: filesystem
    command: npx
    args:
      - -y
      - "@anthropic/mcp-filesystem"
      - /path/to/allowed/dir
    env:
      NODE_ENV: production

  - name: github
    command: npx
    args:
      - -y
      - "@anthropic/mcp-github"
    env:
      GITHUB_TOKEN: ${GITHUB_TOKEN}

# External tool plugins
plugins:
  - name: my-tools
    type: command
    commands:
      - name: deploy
        description: Deploy the application to staging
        execute: ./scripts/deploy.sh
        args: ["--env", "staging"]
      - name: lint_check
        description: Run custom linter
        execute: npm
        args: ["run", "lint"]
