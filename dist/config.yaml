version: 2
project_name: ggcode
release:
  github:
    owner: topcheer
    name: ggcode
  name_template: '{{.Tag}}'
builds:
  - id: ggcode
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    go386:
      - sse2
    goarm:
      - "6"
    goarm64:
      - v8.0
    gomips:
      - hardfloat
    goppc64:
      - power8
    goriscv64:
      - rva20u64
    targets:
      - linux_amd64_v1
      - linux_arm64_v8.0
      - darwin_amd64_v1
      - darwin_arm64_v8.0
      - windows_amd64_v1
      - windows_arm64_v8.0
    dir: .
    main: ./cmd/ggcode
    binary: ggcode
    builder: go
    tool: go
    command: build
    ldflags:
      - -s -w -X github.com/topcheer/ggcode/internal/version.Version={{ .Version }} -X github.com/topcheer/ggcode/internal/version.Commit={{ .Commit }} -X github.com/topcheer/ggcode/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
archives:
  - id: default
    builds_info:
      mode: 493
    name_template: '{{ .ProjectName }}_ {{- .Os }}_ {{- if eq .Arch "amd64" }}x86_64 {{- else }}{{ .Arch }}{{ end }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - src: license*
      - src: LICENSE*
      - src: readme*
      - src: README*
      - src: changelog*
      - src: CHANGELOG*
nfpms:
  - file_name_template: '{{ .ConventionalFileName }}'
    package_name: ggcode
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/ggcode/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/ggcode/README.md
    id: packages
    ids:
      - ggcode
    formats:
      - deb
      - rpm
      - apk
      - ipk
      - archlinux
    section: utils
    priority: optional
    vendor: topcheer
    homepage: https://github.com/topcheer/ggcode
    maintainer: topcheer
    description: AI coding agent for the terminal with a polished TUI, resumable sessions, MCP integrations, built-in tools, and self-update support.
    license: MIT
    bindir: /usr/bin
    libdirs:
      header: /usr/include
      carchive: /usr/lib
      cshared: /usr/lib
srpm:
  nfpmrpm: {}
  package_name: ggcode
  file_name_template: '{{ .PackageName }}-{{ .Version }}.src.rpm'
  bins:
    ggcode: '%{goipath}'
snapshot:
  version_template: '{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}'
checksum:
  name_template: checksums.txt
  algorithm: sha256
docker_digest:
  name_template: digests.txt
changelog:
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - '^chore:'
      - '^style:'
  sort: asc
  format: '{{ .SHA }} {{ .Message }}'
dist: dist
env_files:
  github_token: ~/.config/goreleaser/github_token
  gitlab_token: ~/.config/goreleaser/gitlab_token
  gitea_token: ~/.config/goreleaser/gitea_token
source:
  name_template: '{{ .ProjectName }}-{{ .Version }}'
  format: tar.gz
gomod:
  gobinary: go
announce:
  twitter:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  mastodon:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    server: ""
  reddit:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    url_template: '{{ .ReleaseURL }}'
  slack:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: GoReleaser
  discord:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    author: GoReleaser
    color: "3888754"
    icon_url: https://goreleaser.com/static/avatar.png
  teams:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    color: '#2D313E'
    icon_url: https://goreleaser.com/static/avatar.png
  smtp:
    subject_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    body_template: 'You can view details from: {{ .ReleaseURL }}'
  mattermost:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    color: '#2D313E'
    username: GoReleaser
  linkedin:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  telegram:
    message_template: '{{ print .ProjectName " " .Tag " is out! Check it out at " .ReleaseURL | mdv2escape }}'
    parse_mode: MarkdownV2
  webhook:
    message_template: '{ "message": "{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}"}'
    content_type: application/json; charset=utf-8
    expected_status_codes:
      - 200
      - 201
      - 202
      - 204
  opencollective:
    title_template: '{{ .Tag }}'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out!<br/>Check it out at <a href="{{ .ReleaseURL }}">{{ .ReleaseURL }}</a>'
  bluesky:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  discourse:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: system
sboms:
  - id: default
    cmd: syft
    env:
      - SYFT_FILE_METADATA_CATALOGER_ENABLED=true
    args:
      - $artifact
      - --output
      - spdx-json=$document
      - --enrich
      - all
    documents:
      - '{{ .ArtifactName }}.sbom.json'
    artifacts: archive
git:
  tag_sort: -version:refname
mcp:
  name: ""
  title: ""
  auth:
    type: none
retry:
  attempts: 10
  delay: 10s
  max_delay: 5m0s
github_urls:
  download: https://github.com
gitlab_urls:
  download: https://gitlab.com
brews:
  - name: ggcode
    repository:
      owner: topcheer
      name: homebrew-ggcode
      token: '{{ .Env.TAP_GITHUB_TOKEN }}'
      branch: main
    commit_author:
      name: ggcode-bot
      email: bot@ggcode.dev
    commit_msg_template: Brew formula update for {{ .ProjectName }} version {{ .Tag }}
    directory: Formula
    install: |
      bin.install "ggcode"
    test: |
      system "#{bin}/ggcode", "--version"
    description: AI coding agent for the terminal with TUI, MCP, and IM integrations.
    homepage: https://github.com/topcheer/ggcode
    license: MIT
    skip_upload: auto
    goarm: "6"
    goamd64: v1
